apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: agent-registry
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: localhost:6379
    # Plain state store (no actorStateStore) — the agent registry only does get/save/delete.
    # Same shared dapr_redis as kvstore; the name matches the managed 'agent-registry' store in
    # Catalyst, so dapr.spring-ai.registry.statestore=agent-registry works locally and on Catalyst.
