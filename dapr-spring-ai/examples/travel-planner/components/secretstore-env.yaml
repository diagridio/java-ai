apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: envvar-secret-store
spec:
  type: secretstores.local.env
  version: v1
  # Exposes the sidecar's environment variables as secrets, so the llm conversation component can
  # reference OPENAI_API_KEY without committing it to YAML. Local-dev convenience only — on
  # Catalyst/Kubernetes use a managed secret store instead.
