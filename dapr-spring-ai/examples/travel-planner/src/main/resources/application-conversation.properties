# Profile: conversation — route LLM traffic through the Dapr sidecar's Conversation API instead of
# the in-app OpenAI SDK (dapr-spring-ai-conversation module). The provider is chosen by the `llm`
# component in ./components/llm.yaml (conversation.openai, key via the env secret store), so the app
# itself holds no provider SDK config. Requires a Dapr sidecar (make dapr) with OPENAI_API_KEY
# exported in the sidecar's environment.
#
# Composes with the other profiles: e.g. dapr,memory,registry,conversation runs durable workflows
# whose LLM activity calls the sidecar (make run-dapr-conversation).
spring.ai.model.chat=dapr
dapr.spring-ai.conversation.component=llm
# Match the OpenAI-profile temperature: the Conversation API transmits temperature unconditionally,
# so leaving it unset would send an explicit 0.0 to the provider.
dapr.spring-ai.conversation.temperature=0.7
