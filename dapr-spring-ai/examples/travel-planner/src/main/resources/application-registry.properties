# Profile: registry — publish each ChatClient *bean* (see registry/RegistryAgents.java) to a Dapr
# state store (agent-registry) so the Diagrid dashboard and other Dapr Agents can discover it.
# Requires a Dapr sidecar. The store name matches the managed 'agent-registry' store in Catalyst.
dapr.spring-ai.registry.enabled=true
dapr.spring-ai.registry.statestore=agent-registry
dapr.spring-ai.registry.team=default
