server.port=8080
# Stamped as the app-id on each agent-registry record (the registry defaults to this).
spring.application.name=travel-planner-spring-ai-dapr

# Keep virtual threads on (Java 21+): a blocking ChatClient.call() — the HTTP call to the model, or
# a durable workflow under the dapr profile — then parks a virtual thread instead of a platform one.
spring.threads.virtual.enabled=true

# ── Dapr integration: OFF by default (pure Spring AI 2.0) ────────────────────
# This module runs as plain Spring AI with no Dapr and no sidecar. Opt in per concern with Spring
# profiles (see application-{dapr,memory,registry}.properties); enabling any of them needs a Dapr
# sidecar (`make dapr`), and they compose:
#   --spring.profiles.active=dapr                     durable, Dapr-backed workflows
#   --spring.profiles.active=memory                   Dapr-backed chat memory
#   --spring.profiles.active=registry                 publish agents to the Dapr registry
#   --spring.profiles.active=dapr,memory,registry     the full stack  (make run-dapr)
dapr.spring-ai.enabled=true
dapr.spring-ai.registry.enabled=true
dapr.spring-ai.memory.enabled=true

# ── LLM: OpenAI via Spring AI ────────────────────────────────────────────────
# Export OPENAI_API_KEY in the environment. Swap the model freely.
#
# Two chat models are on the classpath (the OpenAI starter and dapr-spring-ai-conversation), so
# spring.ai.model.chat must pick one: openai (in-app SDK, the default) or dapr (LLM traffic through
# the sidecar's Conversation API). The openai/conversation Spring profiles flip this selector — see
# application-{openai,conversation}.properties.
spring.ai.model.chat=openai
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.temperature=0.7

# To run against a local Ollama instead (no key needed), override at launch (note the /v1 —
# the openai-java SDK appends /chat/completions to the base-url):
#   spring.ai.openai.base-url=http://localhost:11434/v1
#   spring.ai.openai.api-key=ollama
#   spring.ai.openai.chat.model=llama3.1:8b

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.io.diagrid.springai.examples.travelplanner=DEBUG
