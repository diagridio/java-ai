# Profile: memory — persist Spring AI ChatMemory in a Dapr state store (agent-memory) instead of the
# in-process map, so TravelConcierge's /chat conversations survive restarts. Requires a Dapr sidecar.
# The store name matches the managed 'agent-memory' store in Catalyst.
dapr.spring-ai.memory.enabled=true
dapr.spring-ai.memory.statestore=agent-memory
