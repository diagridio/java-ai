# Profile: openai — select the in-app OpenAI SDK as the ChatModel (Spring AI's provider starter).
# This is also the committed default (see application.properties), so the profile exists to make the
# choice explicit and to win back the selector when combined after `conversation`, e.g.
# `--spring.profiles.active=conversation,openai` ends up on OpenAI (last profile wins).
# The spring.ai.openai.* connection settings live in application.properties.
spring.ai.model.chat=openai
