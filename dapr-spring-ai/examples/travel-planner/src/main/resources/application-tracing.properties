# Profile: tracing — export the durable path's spans to Jaeger over OTLP. Requires the `-Ptracing`
# Maven profile (OpenTelemetry bridge + OTLP exporter) and a running Jaeger (`make jaeger`). Activate
# alongside the dapr profile, e.g. `make run-dapr-tracing`.
#
# Sample every trace for the demo, point the OTLP exporter at Jaeger's OTLP/HTTP receiver (this is
# also Boot's default endpoint), and surface the durable-path MDC keys (instance id + tool name) on
# every log line. Boot already prepends the trace/span ids to the console pattern when tracing is on.
management.tracing.sampling.probability=1.0
# Boot 4 property namespace for the OTLP *tracing* exporter (the Boot 3 `management.otlp.tracing.endpoint`
# is deprecated and does not wire the exporter here). Jaeger's OTLP/HTTP receiver is on 4318.
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces
logging.pattern.level=%5p [instance=%X{dapr.springai.instance_id:-}] [tool=%X{dapr.springai.tool_name:-}]

# Boot 4's spring-boot-opentelemetry does NOT derive the OTel service.name from spring.application.name
# (it defaults to "unknown_service:java"), so pin it — otherwise the app's spans land under a different
# Jaeger service than the sidecar's (which reports under the Dapr app-id).
management.opentelemetry.resource-attributes[service.name]=travel-planner-spring-ai-dapr
