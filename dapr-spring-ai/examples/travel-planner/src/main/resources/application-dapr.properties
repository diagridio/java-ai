# Profile: dapr — durable, Dapr-backed execution via the dapr-spring-ai-starter (ChatClient.call()
# runs as a Dapr Workflow). Requires a Dapr sidecar (make dapr) with the kvstore actor state store.
# See application.properties for the off-by-default base.
dapr.spring-ai.enabled=true

# Wait budget for the blocking durable call. If it elapses the workflow keeps running and the call
# throws DurableCallTimeoutException with the instance id (inspect/recover it via the dashboard or
# `dapr workflow` CLI) — keep it generous for slow (multi-tool / retried) calls.
dapr.spring-ai.completion-timeout=10m
