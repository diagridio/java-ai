# Dapr Configuration for the local tracing demo: exports the sidecar's spans (including workflow
# orchestration) to Jaeger over OTLP — the same backend the app uses — so app + sidecar spans are
# correlated by instance id. Applied only when the sidecar is run with `--config
# appconfig-tracing.yaml` (see `make dapr-tracing`); kept separate from appconfig.yaml so the
# Catalyst config stays untouched.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: tracingconfig
spec:
  tracing:
    samplingRate: "1"
    otel:
      endpointAddress: "localhost:4318"
      protocol: http
      isSecure: false
