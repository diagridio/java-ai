name: build

# Build the library and run the full unit-test + static-analysis suite (Checkstyle, SpotBugs, PMD)
# on every PR and every push to main, across the supported JDKs. The crash-recovery integration test
# is NOT here — it is heavy and infra-dependent (Docker + a live Ollama serving llama3.1:8b); run it
# manually with `mvn -pl dapr-spring-ai-core -Pintegration verify`.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repository.
permissions:
  contents: read

# One in-flight run per ref; a newer push to the same ref cancels the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # `install` (not just `verify`) so the example apps below can resolve the freshly built
      # 0.1.0-SNAPSHOT artifacts from the local repo: the examples are standalone apps (not reactor
      # modules) and the SNAPSHOTs are not published anywhere. `install` runs the same unit tests and
      # static analysis as `verify`, then installs.
      - name: Build, test, static analysis
        working-directory: dapr-spring-ai
        run: mvn -B clean install

      # Compile the standalone example apps so they don't bit-rot against the library. JDK 21 leg only:
      # travel-planner targets Java 21 (its pom sets java.version=21) and cannot build on JDK 17. No
      # API keys are needed — the model keys are read at runtime, not compile time.
      - name: Compile example apps
        if: matrix.java == '21'
        working-directory: dapr-spring-ai
        run: |
          mvn -B -f examples/travel-planner/pom.xml clean package -DskipTests
          mvn -B -f examples/durable-chat/pom.xml clean package -DskipTests

      # On failure, keep the surefire reports so test breakages are diagnosable from the run page.
      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/**'
          if-no-files-found: ignore
